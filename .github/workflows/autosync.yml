name: Daily Auto-sync

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: autosync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Auto-sync targets
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          git config --global user.name "Auto Sync Bot"
          git config --global user.email "autosync@opencode.ai"

          python3 .tools/sync.py

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "auto-sync: $(date -u '+%Y-%m-%d %H:%M UTC')"
            DEFAULT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
            git push origin "HEAD:${DEFAULT_BRANCH}"
            echo "✅ 变更已推送到 ${DEFAULT_BRANCH}"
          else
            echo "✅ 无变更，跳过推送"
          fi

      - name: Upload sync log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-log
          path: .tools/sync.log
          retention-days: 7
