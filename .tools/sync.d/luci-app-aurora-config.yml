# 同步规则: luci-app-aurora-config
# 上游: eamonxg/luci-app-aurora-config
# 说明: Aurora 主题配置应用
#
# 可配置字段:
#   source_repo   - 上游仓库（必填）
#   source_path   - 上游仓库中的路径，空字符串表示根目录
#   target        - 本仓库中的目标目录（必填）
#   exclude       - 排除的文件/目录列表（可选，按顶层名匹配）
#   description   - 描述信息（可选，仅用于日志）
#   branch        - 指定分支（可选，留空则自动获取上游默认分支）

source_repo: "eamonxg/luci-app-aurora-config"
source_path: ""
target: "luci-app-aurora-config/"
exclude:
  - ".github"
  - ".gitignore"
  - "README.md"
  - "README_zh.md"
  - "docs"
  - "tests"
  - "package.json"
description: "Aurora 主题配置应用"
branch: ""
