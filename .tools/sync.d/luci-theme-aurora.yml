# 同步规则: luci-theme-aurora
# 上游: eamonxg/luci-theme-aurora
# 说明: Aurora 主题 (Vite + Tailwind CSS)
#
# 可配置字段:
#   source_repo   - 上游仓库（必填）
#   source_path   - 上游仓库中的路径，空字符串表示根目录
#   target        - 本仓库中的目标目录（必填）
#   exclude       - 排除的文件/目录列表（可选，按顶层名匹配）
#   description   - 描述信息（可选，仅用于日志）
#   branch        - 指定分支（可选，留空则自动获取上游默认分支）

source_repo: "eamonxg/luci-theme-aurora"
source_path: ""
target: "luci-theme-aurora/"
exclude:
  - ".claude"
  - ".dev"
  - ".vscode"
  - ".github"
  - ".gitignore"
  - "CLAUDE.md"
  - "README.md"
  - "README_zh.md"
description: "Aurora 主题 (Vite + Tailwind CSS)"
branch: ""
